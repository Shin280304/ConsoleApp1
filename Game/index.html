<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 20px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background-color: #333;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #555;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>Website của tôi</h1>
    <p>Chào mừng bạn đến với trang chủ</p>
</header>

<nav>
    <a href="#">Trang chủ</a>
    <a href="#">Giới thiệu</a>
    <a href="#">Liên hệ</a>
</nav>

<div class="container">
    <h2>Nội dung chính</h2>
    <p>Đây là một trang HTML đơn giản có CSS và JavaScript.</p>

    <button onclick="showMessage()">Bấm vào tôi</button>
</div>

<footer>
    <p>© 2026 - Website đơn giản</p>
</footer>

<script>
    function showMessage() {
        alert("Bạn vừa bấm nút!");
    }
</script>

</body>
</html>
